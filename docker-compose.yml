# ⁘[ DOCKER COMPOSE ~ DEV LOCAL ]⁘
# levanta postgres + server para desarrollo

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: brewscore
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: ./server
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/brewscore?schema=public
      JWT_SECRET: brewscore-dev-secret-change-in-production
      JWT_REFRESH_SECRET: brewscore-dev-refresh-secret-change-in-production
      PORT: "3001"
      CLIENT_URL: http://localhost:5173
    depends_on:
      - db

volumes:
  pgdata:
